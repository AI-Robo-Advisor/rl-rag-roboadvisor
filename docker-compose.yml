services:
  # Training/backtest batch container is not defined yet.
  # When the team needs reproducible RL jobs in Docker, add Dockerfile.train and a train service/profile.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - api
